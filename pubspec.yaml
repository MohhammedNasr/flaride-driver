name: flaride_driver
description: "FlaRide Driver - Delivery Partner App"
publish_to: 'none'

version: 1.0.4+5

environment:
  sdk: '>=3.5.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  supabase_flutter: ^2.6.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  http: ^1.1.0
  shimmer: ^3.0.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.6.1
  flutter_polyline_points: ^3.0.1
  url_launcher: ^6.2.1
  flutter_dotenv: ^5.1.0
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^6.0.5
  cached_network_image: ^3.4.1
  flutter_tts: ^4.0.2
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/app_icon.png
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/app_icon.png"
